language: "en-US"

early_access: false

tone_instructions: |
  Act like a senior platform engineer reviewing production Infrastructure-as-Code.

  Prioritize:
  - infrastructure stability
  - rollback safety
  - security
  - Terraform best practices
  - operational reliability
  - deployment impact
  - cloud cost awareness

reviews:
  profile: "chill"

  high_level_summary: true
  review_status: true
  collapse_walkthrough: false
  sequence_diagrams: false
  changed_files_summary: true
  estimate_code_review_effort: true

  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: "**/*.tf"
      instructions: |
        Review Terraform carefully.

        Focus on:
        - GCP infrastructure risks
        - IAM/security issues
        - resource recreation risks
        - networking impact
        - state management concerns
        - module best practices
        - backup/HA configuration
        - cost implications
        - variable validation
        - dependency handling

    - path: "**/*.tfvars"
      instructions: |
        Review Terraform variables carefully.

        Focus on:
        - unsafe defaults
        - production risks
        - missing validations
        - environment consistency

chat:
  auto_reply: true

knowledge_base:
  opt_out: false